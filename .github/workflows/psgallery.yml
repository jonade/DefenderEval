name: Publish PowerShell Module

on:
  release:
    types: [published]

jobs:
  publish-to-gallery:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
      with:
        ref: main
    - name: Build and publish
      env:
        NUGET_KEY: ${{ secrets.NUGET_KEY }}
        MODULE_VER: ${{ github.ref_name }}
      shell: pwsh
      run: |
        .\.github\build\build.ps1
        Update-ModuleManifest -Path ".\DefenderEval\DefenderEval.psd1" -ModuleVersion ($env:MODULE_VER).TrimStart("v")
        Publish-Module -Path ".\DefenderEval" -NuGetApiKey $env:NUGET_KEY -Verbose
    - name: Commit version bump and update tag
      env:
        TAG_NAME: ${{ github.ref_name }}
      run: |
        git config --global user.name 'github-actions'
        git config --global user.email 'github-actions@github.com'
        git add --all .
        git commit -am "Bump version to ${{ github.ref_name }}"
        git tag -fa $TAG_NAME -m "Release $TAG_NAME"
        git push
        git push --force origin $TAG_NAME